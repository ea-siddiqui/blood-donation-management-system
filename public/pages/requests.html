<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood - BloodLife</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome@6.0.0/css/all.min.css">
    <style>
        .request-form {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .blood-drop-icon {
            width: 80px;
            height: 80px;
            background: #dc3545;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container py-5">
        <div class="request-form card border-danger">
            <div class="card-body">
                <div class="text-center mb-4">
                    <div class="blood-drop-icon rounded-circle d-flex align-items-center justify-content-center mx-auto">
                        <i class="fas fa-hand-holding-medical text-white fs-3"></i>
                    </div>
                    <h2 class="text-danger mt-3">Request Blood Supply</h2>
                </div>

                <form id="bloodRequestForm">
                    <!-- Hospital Information -->
                    <div class="mb-4">
                        <label class="form-label text-danger fw-bold">Hospital/Organization Name</label>
                        <input type="text" class="form-control" name="requestBy" required>
                    </div>

                    <!-- Blood Type Selection -->
                    <div class="mb-4">
                        <label class="form-label text-danger fw-bold">Required Blood Type</label>
                        <select class="form-select" name="bloodType" required>
                            <option value="">Select Blood Type</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                        </select>
                    </div>

                    <!-- Quantity Needed -->
                    <div class="mb-4">
                        <label class="form-label text-danger fw-bold">Quantity Needed (Units)</label>
                        <input type="number" class="form-control" name="quantity" min="1" required>
                        <small class="form-text text-muted">Minimum 1 unit required</small>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">
                            <i class="fas fa-hand-holding-medical me-2"></i>Submit Request
                        </button>
                    </div>
                </form>

                <!-- Response Message -->
                <div id="responseMessage" class="alert mt-3 d-none"></div>
            </div>
        </div>

        <!-- Added Table Below the Form -->
        <div class="card mt-5">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="fas fa-list me-2"></i>All Blood Requests</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-danger">
                            <tr>
                                <th>Request ID</th>
                                <th>Request By</th>
                                <th>Blood Type</th>
                                <th>Quantity</th>
                                <th>Request Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="requestsTableBody">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-danger" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Load components
        Promise.all([
            fetch('../components/header.html').then(r => r.text()),
            fetch('../components/footer.html').then(r => r.text())
        ]).then(([header, footer]) => {
            document.getElementById('header').innerHTML = header;
            document.getElementById('footer').innerHTML = footer;
            document.querySelectorAll('.nav-link').forEach(link => {
                if(link.href.endsWith('requests.html')) link.classList.add('active');
            });
        });

        // Handle form submission
        document.getElementById('bloodRequestForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                requestBy: e.target.requestBy.value,
                bloodType: e.target.bloodType.value,
                quantity: parseInt(e.target.quantity.value),
            };

            const responseMessage = document.getElementById('responseMessage');
            responseMessage.classList.add('d-none');

            try {
                const response = await fetch('http://localhost:3000/api/blood-requests', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        RequestBy: formData.requestBy,
                        BloodType: formData.bloodType,
                        Quantity: formData.quantity,
                    })
                });

                if (!response.ok) throw new Error('Request failed');

                // Clear form and show success message
                e.target.reset();
                showResponse('Request submitted successfully!', 'success');
            } catch (error) {
                console.error('Error:', error);
                showResponse('Failed to submit request. Please try again.', 'danger');
            }
        });

        function showResponse(message, type) {
            const responseMessage = document.getElementById('responseMessage');
            responseMessage.textContent = message;
            responseMessage.className = `alert alert-${type} mt-3`;
            responseMessage.classList.remove('d-none');
            
            // Hide message after 5 seconds
            setTimeout(() => {
                responseMessage.classList.add('d-none');
            }, 5000);
        }

        // Load and render all blood requests
        async function loadRequests() {
            const tbody = document.getElementById('requestsTableBody');
            try {
                const res = await fetch('http://localhost:3000/api/blood-requests');
                if (!res.ok) throw new Error('Failed to load requests');

                const requests = await res.json();
                tbody.innerHTML = requests.length > 0 ? requests.map(req => `
                    <tr>
                        <td>${req.RequestID}</td>
                        <td>${req.RequestBy}</td>
                        <td><span class="badge bg-danger">${req.BloodType}</span></td>
                        <td>${req.Quantity}</td>
                        <td>${req.RequestDate || 'N/A'}</td>
                        <td>
                            ${req.Fulfilled ? 
                                '<span class="badge bg-success">Fulfilled</span>' :
                                '<span class="badge bg-warning text-dark">Pending</span>'
                            }
                        </td>
                    </tr>
                `).join('') : `
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">No requests found</td>
                    </tr>
                `;
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center py-4">Error loading data</td></tr>`;
            }
        }
        (async () => {
            await loadRequests();
        })();
    </script>
</body>
</html>
