<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Inventory | BloodBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <div id="header"></div>

    <!-- Main Content -->
    <main class="container py-5 mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-danger"><i class="fas fa-chart-pie"></i> Blood Inventory</h2>
            <div class="badge bg-danger">Last Updated: <span id="lastUpdated"></span></div>
        </div>

        <!-- Inventory Cards -->
        <div class="row g-4 mb-5" id="inventoryCards">
            <div class="col-12 text-center">
                <div class="spinner-border text-danger" role="status">
                    <span class="visually-hidden">Loading Inventory...</span>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="row g-4">
            <div class="col-lg-8">
                <div class="chart-container shadow">
                    <h5 class="text-danger mb-4"><i class="fas fa-chart-bar"></i> Inventory Distribution</h5>
                    <canvas id="inventoryChart" style="max-width: 500px; max-height: 500px; margin: auto;"></canvas>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="chart-container shadow">
                    <h5 class="text-danger mb-4"><i class="fas fa-exclamation-triangle"></i> Critical Stock</h5>
                    <canvas id="criticalChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        fetch('../components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
                const currentPage = location.pathname.split('/').pop();
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('href') === currentPage) {
                        link.classList.add('active');
                    }
                });
            })
            .catch(error => console.error('Header loading error:', error));

        fetch('../components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data)
            .catch(error => console.error('Footer loading error:', error));

        let inventoryChart, criticalChart;

        async function loadInventory() {
            try {
                const response = await fetch('http://localhost:3000/api/inventory');
                const inventory = await response.json();
                const now = new Date();

                document.getElementById('lastUpdated').textContent =
                    `${now.toLocaleDateString()} ${now.toLocaleTimeString()}`;

                const container = document.getElementById('inventoryCards');
                container.innerHTML = inventory.map(item => `
                    <div class="col-md-3">
                        <div class="card inventory-card shadow h-100">
                            <div class="card-body text-center">
                                <div class="blood-type ${item.Quantity <= 1 ? 'critical' : ''}">
                                    ${item.BloodType}
                                </div>
                                <h4 class="my-3">${item.Quantity} Units</h4>
                                <div class="progress">
                                    <div class="progress-bar bg-danger"
                                         style="width: ${Math.min(item.Quantity / 2, 100)}%">
                                    </div>
                                </div>
                                ${item.Quantity < 1 ? `
                                    <small class="text-danger mt-2 d-block">
                                        <i class="fas fa-exclamation-circle"></i> Low Stock
                                    </small>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('');

                updateCharts(inventory);

            } catch (error) {
                document.getElementById('inventoryCards').innerHTML = `
                    <div class="col-12">
                        <div class="alert alert-danger">Error loading inventory: ${error.message}</div>
                    </div>
                `;
            }
        }

        function updateCharts(inventory) {
            const ctx = document.getElementById('inventoryChart').getContext('2d');
            const criticalCtx = document.getElementById('criticalChart').getContext('2d');

            if (inventoryChart) inventoryChart.destroy();
            if (criticalChart) criticalChart.destroy();

            inventoryChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: inventory.map(i => i.BloodType),
                    datasets: [{
                        data: inventory.map(i => i.Quantity),
                        backgroundColor: [
                            '#ff6384', '#36a2eb', '#ffce56', '#4bc0c0',
                            '#9966ff', '#ff9f40', '#eb5757', '#2d9cdb'
                        ]
                    }]
                }
            });

            const criticalData = inventory.filter(i => i.Quantity <= 20);

            criticalChart = new Chart(criticalCtx, {
                type: 'bar',
                data: {
                    labels: criticalData.map(i => i.BloodType),
                    datasets: [{
                        label: 'Units Remaining',
                        data: criticalData.map(i => i.Quantity),
                        backgroundColor: '#dc3545'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    scales: {
                        x: { beginAtZero: true }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', loadInventory);
        setInterval(loadInventory, 300000);
    </script>
</body>
</html>
